<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IS日次報告</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f7fa;--surface:#ffffff;--surface2:#f0f3f8;--border:#dde3ed;
  --accent:#2563eb;--accent2:#0891b2;--green:#059669;--yellow:#d97706;--red:#dc2626;
  --text:#1e293b;--muted:#64748b;--radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:6px;min-height:56px;position:sticky;top:0;z-index:100;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nav-logo{font-size:15px;font-weight:700;color:var(--accent);margin-right:16px;white-space:nowrap;}
.nav-tab{background:none;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:var(--accent);color:#fff;}
.main{flex:1;padding:24px 20px;max-width:1200px;margin:0 auto;width:100%;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card+.card{margin-top:16px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:700px){.grid2,.grid4{grid-template-columns:1fr 1fr;}}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.stat-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--text);}
.stat-value.blue{color:var(--accent);}.stat-value.green{color:var(--green);}
.stat-value.yellow{color:var(--yellow);}.stat-value.cyan{color:var(--accent2);}
.progress-bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:5px;}
.progress-fill{height:100%;border-radius:999px;transition:width .5s;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:9px 12px;text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap;background:#fafbfc;}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tr:last-child td{border-bottom:none;}tr:hover td{background:#f8faff;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;}
.form-input,.form-select{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;transition:border .2s;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-input:disabled,.form-select:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.call-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:480px){.call-grid{grid-template-columns:repeat(4,1fr);}}
.call-field{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:10px;}
.call-field label{display:block;font-size:10px;font-weight:700;margin-bottom:4px;color:var(--muted);}
.call-field input{width:100%;background:transparent;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:20px;font-weight:700;outline:none;}
.btn{border:none;border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;padding:9px 18px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1d4ed8;}
.btn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red);font-size:12px;padding:5px 10px;}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);font-size:13px;padding:7px 14px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#047857;}
.btn-export{background:#fff;border:1.5px solid var(--green);color:var(--green);font-size:13px;padding:7px 14px;font-weight:700;}
.btn-export:hover{background:var(--green);color:#fff;}
.badge{display:inline-block;border-radius:99px;font-size:11px;font-weight:700;padding:2px 9px;}
.badge-blue{background:#eff6ff;color:var(--accent);}
.badge-cyan{background:#ecfeff;color:var(--accent2);}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.sec-title{font-size:17px;font-weight:700;color:var(--text);}
.success-msg{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:14px;color:var(--green);font-weight:700;text-align:center;margin-bottom:16px;}
.error-msg{background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;padding:12px;color:var(--red);margin-bottom:14px;font-size:13px;font-weight:600;}
.warn-msg{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#92400e;font-weight:600;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-row select{background:#fff;border:1.5px solid var(--border);color:var(--text);border-radius:7px;padding:7px 12px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.filter-row select:focus{border-color:var(--accent);}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:14px;}
.member-tag{background:var(--surface2);border:1.5px solid var(--border);border-radius:5px;font-size:12px;padding:3px 10px;color:var(--muted);cursor:pointer;display:inline-block;margin:2px;transition:all .2s;font-weight:500;}
.member-tag.selected{background:#eff6ff;border-color:var(--accent);color:var(--accent);}
.list-entry{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.list-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.list-entry-title{font-size:13px;font-weight:700;color:var(--accent2);}
.list-chip{background:#ecfeff;border:1px solid #a5f3fc;border-radius:6px;padding:3px 10px;font-size:12px;color:var(--accent2);display:inline-flex;align-items:center;gap:6px;margin:2px;font-weight:600;}
.list-chip-x{cursor:pointer;color:var(--red);font-weight:700;font-size:14px;}
.expand-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px;font-weight:700;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:10px;font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ===== GAS API URL =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbxIlzttIprsOsUfNAzR3hdlzps0KHtpztzEuAbQ2xqCqhTAmvjrjARS2SukhvI-wPV7/exec";

// ===== API HELPERS =====
async function apiGet() {
  const res = await fetch(GAS_URL);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function apiPost(body) {
  // GASのPOSTはno-corsで送信（CORSエラー回避）
  // レスポンスは読めないが、GAS側は正常処理される
  await fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body),
  });
  return { success: true };
}

// ===== DEFAULTS =====
const DEFAULT_MEMBERS = [
  {id:"m1", name:"田中 花子"},
  {id:"m2", name:"佐藤 太郎"},
  {id:"m3", name:"鈴木 一郎"},
];
const DEFAULT_PROJECTS = [
  {id:"p1", name:"株式会社Aサービス", targetAppo:20, memberIds:["m1","m2"], lists:["リストA-1","リストA-2"]},
  {id:"p2", name:"B社クラウド案件",   targetAppo:15, memberIds:["m2","m3"], lists:["リストB-1"]},
];

const CALL_FIELDS = [
  {key:"calls",             label:"架電数",       color:"var(--text)"},
  {key:"appo",              label:"アポ数",       color:"var(--accent)"},
  {key:"materialSelf",      label:"本人資料請求", color:"var(--accent2)"},
  {key:"noAnswer",          label:"不通",         color:"var(--muted)"},
  {key:"absent",            label:"本人不在",     color:"var(--muted)"},
  {key:"rejectedSelf",      label:"本人拒否",     color:"var(--red)"},
  {key:"rejectedReception", label:"受付拒否",     color:"var(--red)"},
  {key:"materialReception", label:"受付資料請求", color:"var(--yellow)"},
];

const EMPTY_ENTRY = () => ({listName:"",workHours:"",calls:"",appo:"",materialSelf:"",noAnswer:"",absent:"",rejectedSelf:"",rejectedReception:"",materialReception:""});

function calcStats(reports) {
  const t = {workHours:0,calls:0,appo:0,materialSelf:0,noAnswer:0,absent:0,rejectedSelf:0,rejectedReception:0,materialReception:0};
  reports.forEach(r => {
    const entries = r.entries && r.entries.length ? r.entries : [r];
    entries.forEach(e => { Object.keys(t).forEach(k => { t[k] += Number(e[k])||0; }); });
  });
  const connected = t.appo + t.materialSelf + t.absent + t.rejectedSelf;
  const listCaDenom = t.appo + t.materialSelf + t.rejectedSelf;
  return {
    ...t, connected,
    appoRate:      t.calls>0 ? ((t.appo/t.calls)*100).toFixed(1) : "0.0",
    connectRate:   t.calls>0 ? ((connected/t.calls)*100).toFixed(1) : "0.0",
    caRate:        connected>0 ? (((t.appo+t.materialSelf)/connected)*100).toFixed(1) : "0.0",
    listCaRate:    listCaDenom>0 ? ((t.appo/listCaDenom)*100).toFixed(1) : "0.0",
    callsPerHour:  t.workHours>0 ? (t.calls/t.workHours).toFixed(1) : "-",
  };
}

function exportToCSV(reports, members, projects) {
  const getM = id => members.find(m=>m.id===id)?.name||id;
  const getP = id => projects.find(p=>p.id===id)?.name||id;
  const rows = [["日付","名前","案件名","リスト名","架電数","アポ数","本人資料請求","不通","本人不在","本人拒否","受付拒否","受付資料請求","アポ率(%)","通電率(%)","CA率(%)"]];
  reports.sort((a,b)=>a.date?.localeCompare(b.date)).forEach(r => {
    const entries = Array.isArray(r.entries) ? r.entries : [];
    entries.forEach(e => {
      const s = calcStats([{entries:[e]}]);
      rows.push([r.date,getM(r.memberId),getP(r.projectId),e.listName,
        Number(e.calls)||0,Number(e.appo)||0,Number(e.materialSelf)||0,
        Number(e.noAnswer)||0,Number(e.absent)||0,Number(e.rejectedSelf)||0,
        Number(e.rejectedReception)||0,Number(e.materialReception)||0,
        s.appoRate,s.connectRate,s.caRate]);
    });
  });
  const bom = "\uFEFF";
  const csv = bom + rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`IS報告_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

const C_GREEN="#059669", C_YELLOW="#d97706", C_ACCENT="#2563eb";

// ===== DASHBOARD =====
function DashboardView({members, projects, reports, loading}) {
  const [fp,setFp]=useState("all"), [fm,setFm]=useState("all"), [fmo,setFmo]=useState("all");
  const months=[...new Set(reports.map(r=>r.date?.slice(0,7)))].sort().reverse();
  const filtered=reports.filter(r=>{
    if(fp!=="all"&&r.projectId!==fp)return false;
    if(fm!=="all"&&r.memberId!==fm)return false;
    if(fmo!=="all"&&!r.date?.startsWith(fmo))return false;
    return true;
  });
  const overall=calcStats(filtered);
  const getP=id=>projects.find(p=>p.id===id)?.name||id;
  const listMap={};
  filtered.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const k=r.projectId+"|||"+e.listName;
      if(!listMap[k])listMap[k]={projectId:r.projectId,listName:e.listName,rows:[]};
      listMap[k].rows.push(e);
    });
  });

  if(loading) return <div className="loading"><div className="spinner"/>データを読み込み中...</div>;

  return (
    <div>
      <div className="sec-header">
        <div className="sec-title">📊 ダッシュボード</div>
        <button className="btn btn-export" onClick={()=>exportToCSV(filtered,members,projects)}>⬇️ CSVエクスポート</button>
      </div>
      <div className="filter-row">
        <select value={fp} onChange={e=>setFp(e.target.value)}>
          <option value="all">全案件</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={fm} onChange={e=>setFm(e.target.value)}>
          <option value="all">全メンバー</option>
          {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <select value={fmo} onChange={e=>setFmo(e.target.value)}>
          <option value="all">全期間</option>
          {months.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">全体サマリー（{filtered.length}件の報告）</div>
        <div className="grid4">
          {[
            {label:"架電数",val:overall.calls.toLocaleString(),cls:""},
            {label:"アポ数",val:overall.appo,cls:"blue"},
            {label:"アポ率",val:overall.appoRate+"%",cls:"green"},
            {label:"通電率",val:overall.connectRate+"%",cls:"yellow"},
            {label:"CA率",val:overall.caRate+"%",cls:"cyan"},
            {label:"本人資料請求",val:overall.materialSelf,cls:""},
            {label:"受付資料請求",val:overall.materialReception,cls:""},
            {label:"不通",val:overall.noAnswer,cls:""},
          ].map(s=>(
            <div className="stat" key={s.label}>
              <div className="stat-label">{s.label}</div>
              <div className={`stat-value ${s.cls}`}>{s.val}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">案件別進捗</div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>案件名</th><th>目標</th><th>アポ</th><th>進捗率</th><th>架電</th><th>アポ率</th><th>通電率</th><th>CA率</th></tr></thead>
            <tbody>
              {projects.map(p=>{
                const s=calcStats(filtered.filter(r=>r.projectId===p.id));
                const pct=p.targetAppo>0?Math.min(100,s.appo/p.targetAppo*100).toFixed(0):0;
                const col=pct>=80?C_GREEN:pct>=50?C_YELLOW:C_ACCENT;
                return(
                  <tr key={p.id}>
                    <td style={{fontWeight:700}}>{p.name}</td>
                    <td>{p.targetAppo}</td>
                    <td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                    <td><span style={{fontSize:12,fontWeight:700,color:col}}>{pct}%</span>
                      <div className="progress-bar"><div className="progress-fill" style={{width:pct+"%",background:col}}/></div></td>
                    <td>{s.calls}</td><td>{s.appoRate}%</td><td>{s.connectRate}%</td><td>{s.caRate}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {Object.keys(listMap).length>0&&(
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">リスト別詳細</div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>案件</th><th>リスト名</th><th>架電</th><th>アポ</th><th>本人資料</th><th>不通</th><th>不在</th><th>本人拒否</th><th>受付拒否</th><th>受付資料</th><th>アポ率</th><th>通電率</th><th>CA率</th></tr></thead>
              <tbody>
                {Object.values(listMap).map((ls,i)=>{
                  const s=calcStats([{entries:ls.rows}]);
                  return(
                    <tr key={i}>
                      <td><span className="badge badge-blue">{getP(ls.projectId)}</span></td>
                      <td style={{color:"var(--accent2)",fontWeight:700}}>{ls.listName}</td>
                      <td>{s.calls}</td><td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                      <td>{s.materialSelf}</td>
                      <td style={{color:"var(--muted)"}}>{s.noAnswer}</td>
                      <td style={{color:"var(--muted)"}}>{s.absent}</td>
                      <td style={{color:"var(--red)"}}>{s.rejectedSelf}</td>
                      <td style={{color:"var(--red)"}}>{s.rejectedReception}</td>
                      <td>{s.materialReception}</td>
                      <td>{s.appoRate}%</td><td>{s.connectRate}%</td>
                      <td style={{color:"var(--green)",fontWeight:700}}>{s.listCaRate}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-title">メンバー別実績</div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>名前</th><th>報告数</th><th>稼働時間</th><th>架電</th><th>1h当りコール</th><th>アポ</th><th>アポ率</th><th>通電率</th><th>CA率</th></tr></thead>
            <tbody>
              {members.map(m=>{
                const mr=filtered.filter(r=>r.memberId===m.id);
                if(!mr.length)return null;
                const s=calcStats(mr);
                return(
                  <tr key={m.id}>
                    <td style={{fontWeight:700}}>{m.name}</td>
                    <td><span className="badge badge-blue">{mr.length}日</span></td>
                    <td>{s.workHours>0?s.workHours+"h":"-"}</td>
                    <td>{s.calls}</td>
                    <td style={{color:"var(--accent2)",fontWeight:700}}>{s.callsPerHour}</td>
                    <td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                    <td>{s.appoRate}%</td><td>{s.connectRate}%</td><td>{s.caRate}%</td>
                  </tr>
                );
              })}
              {members.every(m=>filtered.filter(r=>r.memberId===m.id).length===0)&&(
                <tr><td colSpan={9} className="empty">報告データがありません</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ===== REPORT FORM =====
function ReportFormView({members, projects, onSubmit, loading}) {
  const today=new Date().toISOString().slice(0,10);
  const [date,setDate]=useState(today);
  const [memberId,setMemberId]=useState("");
  const [projectId,setProjectId]=useState("");
  const [entries,setEntries]=useState([EMPTY_ENTRY()]);
  const [submitted,setSubmitted]=useState(false);
  const [error,setError]=useState("");
  const [sending,setSending]=useState(false);

  const memberProjects=memberId?projects.filter(p=>(p.memberIds||[]).map(x=>String(x)).includes(String(memberId))):[];
  const currentProject=projects.find(p=>p.id===projectId);
  // listsが文字列で来た場合も配列に変換する（読み込みタイミングのずれ対策）
  const rawLists = currentProject?.lists;
  const listOptions = Array.isArray(rawLists)
    ? rawLists
    : (typeof rawLists === "string" && rawLists.startsWith("["))
      ? (() => { try { return JSON.parse(rawLists); } catch(e) { return []; } })()
      : rawLists ? [rawLists] : [];

  const setEntry=(i,k,v)=>setEntries(es=>es.map((e,j)=>j===i?{...e,[k]:v}:e));
  const addEntry=()=>setEntries(es=>[...es,EMPTY_ENTRY()]);
  const removeEntry=i=>setEntries(es=>es.filter((_,j)=>j!==i));
  const reset=()=>{setMemberId("");setProjectId("");setDate(today);setEntries([EMPTY_ENTRY()]);setSubmitted(false);setError("");};

  const handleSubmit=async()=>{
    if(!memberId){setError("名前を選択してください");return;}
    if(!projectId){setError("案件を選択してください");return;}
    if(entries.some(e=>!e.listName)){setError("すべてのリスト名を入力してください");return;}
    if(entries.some(e=>!e.calls)){setError("架電数を入力してください");return;}
    setError(""); setSending(true);
    try {
      await onSubmit({id:Date.now().toString(),createdAt:new Date().toISOString(),date,memberId,projectId,entries});
      setSubmitted(true);
    } catch(e) {
      setError("送信に失敗しました。もう一度お試しください。");
    } finally { setSending(false); }
  };

  if(loading) return <div className="loading"><div className="spinner"/>データを読み込み中...</div>;

  if(submitted) return(
    <div style={{maxWidth:600,margin:"0 auto"}}>
      <div className="success-msg">✅ 報告を送信しました！お疲れ様でした。</div>
      <div style={{textAlign:"center"}}><button className="btn btn-primary" onClick={reset}>続けて報告する</button></div>
    </div>
  );

  return(
    <div style={{maxWidth:660,margin:"0 auto"}}>
      <div className="sec-title" style={{marginBottom:16}}>📋 日次報告入力</div>
      {error&&<div className="error-msg">⚠️ {error}</div>}
      <div className="card">
        <div className="grid2" style={{gap:12,marginBottom:14}}>
          <div><label className="form-label">日付</label>
            <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label className="form-label">名前</label>
            <select className="form-select" value={memberId} onChange={e=>{setMemberId(e.target.value);setProjectId("");}}>
              <option value="">選択してください</option>
              {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select></div>
        </div>
        <div><label className="form-label">案件
          {!memberId&&<span style={{color:"var(--muted)",fontWeight:400,fontSize:11}}> ← 先に名前を選んでください</span>}
        </label>
          <select className="form-select" value={projectId} onChange={e=>{setProjectId(e.target.value);setEntries([EMPTY_ENTRY()]);}} disabled={!memberId}>
            <option value="">選択してください</option>
            {memberProjects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
      </div>

      {entries.map((entry,i)=>(
        <div className="list-entry" key={i} style={{marginTop:12}}>
          <div className="list-entry-header">
            <span className="list-entry-title">📁 リスト {i+1}</span>
            {entries.length>1&&<button className="btn btn-danger" onClick={()=>removeEntry(i)}>削除</button>}
          </div>
          <div style={{marginBottom:12}}>
            <label className="form-label">リスト名</label>
            {listOptions.length>0
              ?<select className="form-select" value={entry.listName} onChange={e=>setEntry(i,"listName",e.target.value)}>
                <option value="">選択してください</option>
                {listOptions.map(l=><option key={l} value={l}>{l}</option>)}
              </select>
              :<input className="form-input" placeholder="案件を先に選んでください" value={entry.listName}
                onChange={e=>setEntry(i,"listName",e.target.value)} disabled={!projectId}/>
            }
          </div>
          <div style={{marginBottom:12}}>
            <label className="form-label">稼働時間（例：3.5）</label>
            <input className="form-input" type="number" min="0" step="0.5" placeholder="例：3.5"
              value={entry.workHours} onChange={e=>setEntry(i,"workHours",e.target.value)}
              style={{maxWidth:160}}/>
          </div>
          <div className="call-grid">
            {CALL_FIELDS.map(f=>(
              <div className="call-field" key={f.key}>
                <label style={{color:["var(--text)","var(--muted)"].includes(f.color)?"var(--muted)":f.color}}>{f.label}</label>
                <input type="number" min="0" placeholder="0" value={entry[f.key]}
                  onChange={e=>setEntry(i,f.key,e.target.value)}
                  style={{color:["var(--text)","var(--muted)"].includes(f.color)?"var(--text)":f.color}}/>
              </div>
            ))}
          </div>
        </div>
      ))}

      <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"space-between"}}>
        <button className="btn btn-ghost" onClick={addEntry}>＋ リストを追加</button>
        <button className="btn btn-primary" onClick={handleSubmit} disabled={sending} style={{minWidth:130}}>
          {sending?<><div className="spinner" style={{width:16,height:16,borderWidth:2}}/>送信中...</>:"送信する →"}
        </button>
      </div>
    </div>
  );
}

// ===== REPORTS LIST =====
function ReportsView({members, projects, reports, onDelete, loading}) {
  const [fp,setFp]=useState("all"),[fm,setFm]=useState("all"),[expandedId,setExpandedId]=useState(null);
  const getM=id=>members.find(m=>m.id===id)?.name||id;
  const getP=id=>projects.find(p=>p.id===id)?.name||id;
  const filtered=reports.filter(r=>{
    if(fp!=="all"&&r.projectId!==fp)return false;
    if(fm!=="all"&&r.memberId!==fm)return false;
    return true;
  }).sort((a,b)=>b.date?.localeCompare(a.date));

  if(loading) return <div className="loading"><div className="spinner"/>データを読み込み中...</div>;

  return(
    <div>
      <div className="sec-header">
        <div className="sec-title">🗂 報告一覧</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className="badge badge-blue">{filtered.length}件</span>
          <button className="btn btn-export" onClick={()=>exportToCSV(filtered,members,projects)}>⬇️ CSVエクスポート</button>
        </div>
      </div>
      <div className="filter-row">
        <select value={fp} onChange={e=>setFp(e.target.value)}>
          <option value="all">全案件</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={fm} onChange={e=>setFm(e.target.value)}>
          <option value="all">全メンバー</option>
          {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
      </div>
      <div className="card">
        <div className="tbl-wrap">
          <table>
            <thead><tr><th></th><th>日付</th><th>名前</th><th>案件</th><th>リスト数</th><th>架電</th><th>アポ</th><th>アポ率</th><th>通電率</th><th></th></tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={10} className="empty">報告がありません</td></tr>}
              {filtered.map(r=>{
                const s=calcStats([r]);
                const isExp=expandedId===r.id;
                return(
                  <React.Fragment key={r.id}>
                    <tr>
                      <td><button className="expand-btn" onClick={()=>setExpandedId(isExp?null:r.id)}>{isExp?"▲":"▼"}</button></td>
                      <td>{r.date}</td>
                      <td style={{fontWeight:700}}>{getM(r.memberId)}</td>
                      <td><span className="badge badge-blue">{getP(r.projectId)}</span></td>
                      <td><span className="badge badge-cyan">{(r.entries||[]).length}リスト</span></td>
                      <td>{s.calls}</td>
                      <td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                      <td>{s.appoRate}%</td><td>{s.connectRate}%</td>
                      <td style={{color:"var(--green)",fontWeight:700}}>{s.listCaRate}%</td>
                      <td><button className="btn btn-danger" onClick={()=>onDelete(r.id)}>削除</button></td>
                    </tr>
                    {isExp&&(r.entries||[]).map((e,i)=>{
                      const es=calcStats([{entries:[e]}]);
                      return(
                        <tr key={i} style={{background:"#f8faff"}}>
                          <td/><td/><td/>
                          <td style={{color:"var(--accent2)",fontSize:12,fontWeight:600}}>└ {e.listName}</td>
                          <td/>
                          <td style={{fontSize:12}}>{Number(e.calls)||0}</td>
                          <td style={{color:"var(--accent)",fontSize:12,fontWeight:700}}>{Number(e.appo)||0}</td>
                          <td style={{fontSize:12}}>{es.appoRate}%</td>
                          <td style={{fontSize:12}}>{es.connectRate}%</td>
                          <td/>
                        </tr>
                      );
                    })}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ===== ADMIN =====
function AdminView({members, projects, onSaveMembers, onSaveProjects, loading}) {
  const [lm,setLm]=useState(members);
  const [lp,setLp]=useState(projects);
  const [newM,setNewM]=useState("");
  const [newP,setNewP]=useState({name:"",targetAppo:"",memberIds:[],lists:[]});
  const [listInputs,setListInputs]=useState({});
  const [savedMsg,setSavedMsg]=useState("");
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState("");

  useEffect(()=>setLm(members.map(m=>({...m,id:String(m.id)}))),[members]);
  useEffect(()=>setLp(projects),[projects]);

  const save=async()=>{
    setSaving(true); setError("");
    try {
      await onSaveMembers(lm);
      await onSaveProjects(lp);
      // no-corsのPOSTは成功してもレスポンスが読めないため、1秒待って完了とみなす
      await new Promise(r => setTimeout(r, 1000));
      setSavedMsg("✅ 保存しました！PC・スマホ両方に反映されます。");
      setTimeout(()=>setSavedMsg(""),4000);
    } catch(e) {
      console.error("Save error:", e);
      setError("保存に失敗しました。もう一度お試しください。");
    } finally { setSaving(false); }
  };

  const addM=()=>{if(!newM.trim())return;setLm(ms=>[...ms,{id:Date.now().toString(),name:newM.trim()}]);setNewM("");};
  const addP=()=>{
    if(!newP.name.trim())return;
    setLp(ps=>[...ps,{...newP,id:Date.now().toString(),targetAppo:Number(newP.targetAppo)||0}]);
    setNewP({name:"",targetAppo:"",memberIds:[],lists:[]});
  };
  const toggleM=(mId,pidx)=>setLp(ps=>ps.map((p,i)=>{
    if(i!==pidx)return p;
    // IDはすべて文字列に統一・重複排除
    const current=[...new Set((p.memberIds||[]).map(x=>String(x)))];
    const sid=String(mId);
    const ids=current.includes(sid)?current.filter(x=>x!==sid):[...current,sid];
    return{...p,memberIds:ids};
  }));
  const addList=(pidx)=>{
    const v=(listInputs[pidx]||"").trim();if(!v)return;
    setLp(ps=>ps.map((p,i)=>i===pidx?{...p,lists:[...(p.lists||[]),v]}:p));
    setListInputs(s=>({...s,[pidx]:""}));
  };
  const removeList=(pidx,lidx)=>setLp(ps=>ps.map((p,i)=>i===pidx?{...p,lists:p.lists.filter((_,j)=>j!==lidx)}:p));

  if(loading) return <div className="loading"><div className="spinner"/>データを読み込み中...</div>;

  return(
    <div>
      <div className="sec-header">
        <div className="sec-title">⚙️ マスタ管理</div>
        <button className="btn btn-green" onClick={save} disabled={saving}>
          {saving?<><div className="spinner" style={{width:16,height:16,borderWidth:2,borderTopColor:"#fff"}}/>保存中...</>:"💾 保存する"}
        </button>
      </div>
      {savedMsg&&<div className="success-msg">{savedMsg}</div>}
      {error&&<div className="error-msg">⚠️ {error}</div>}
      <div className="warn-msg">⚠️ 変更後は必ず「保存する」を押してください。Googleスプレッドシートに保存され、PC・スマホ共通で反映されます。</div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">メンバー管理</div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input className="form-input" style={{flex:1}} placeholder="新規メンバー名を入力" value={newM}
            onChange={e=>setNewM(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addM()}/>
          <button className="btn btn-primary" onClick={addM}>追加</button>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>名前</th><th></th></tr></thead>
            <tbody>
              {lm.map((m,i)=>(
                <tr key={m.id}>
                  <td><input className="form-input" value={m.name} style={{maxWidth:280}}
                    onChange={e=>setLm(ms=>ms.map((x,j)=>j===i?{...x,name:e.target.value}:x))}/></td>
                  <td><button className="btn btn-danger" onClick={()=>setLm(ms=>ms.filter((_,j)=>j!==i))}>削除</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <div className="card-title">案件管理</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,marginBottom:14}}>
          <input className="form-input" placeholder="案件名" value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))}/>
          <input className="form-input" placeholder="目標アポ数" type="number" style={{width:100}} value={newP.targetAppo} onChange={e=>setNewP(p=>({...p,targetAppo:e.target.value}))}/>
          <button className="btn btn-primary" onClick={addP}>追加</button>
        </div>
        {lp.map((p,pidx)=>(
          <div key={p.id} style={{background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,marginBottom:12,alignItems:"center"}}>
              <input className="form-input" value={p.name}
                onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,name:e.target.value}:x))}/>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",fontWeight:700}}>目標アポ</span>
                <input className="form-input" type="number" style={{width:70}} value={p.targetAppo}
                  onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,targetAppo:Number(e.target.value)}:x))}/>
              </div>
              <button className="btn btn-danger" onClick={()=>setLp(ps=>ps.filter((_,j)=>j!==pidx))}>削除</button>
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontWeight:700}}>担当メンバー（クリックで選択）</div>
            <div style={{marginBottom:14,display:"flex",flexWrap:"wrap",gap:4}}>
              {lm.map(m=>(
                <span key={m.id} className={`member-tag ${(p.memberIds||[]).map(x=>String(x)).includes(String(m.id))?"selected":""}`}
                  onClick={()=>toggleM(m.id,pidx)}>{m.name}</span>
              ))}
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:8,fontWeight:700}}>リスト管理</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
              {(p.lists||[]).map((l,lidx)=>(
                <span key={lidx} className="list-chip">{l}
                  <span className="list-chip-x" onClick={()=>removeList(pidx,lidx)}>×</span>
                </span>
              ))}
              {!(p.lists||[]).length&&<span style={{fontSize:12,color:"var(--muted)"}}>リストがまだ登録されていません</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input className="form-input" style={{flex:1}} placeholder="新規リスト名（例：リストA-3）"
                value={listInputs[pidx]||""}
                onChange={e=>setListInputs(s=>({...s,[pidx]:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&addList(pidx)}/>
              <button className="btn btn-ghost" onClick={()=>addList(pidx)}>＋追加</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== ROOT =====
function App() {
  const [tab,setTab]=useState("report");
  const [members,setMembers]=useState([]);
  const [projects,setProjects]=useState([]);
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const [initError,setInitError]=useState("");

  // 起動時にスプレッドシートから全データ読み込み
  useEffect(()=>{
    (async()=>{
      try {
        const data = await apiGet();
        // listsとmemberIdsが文字列で来た場合もパースして必ず配列にする
        const projects = (data.projects||[]).map(p => {
          // listsを配列に変換
          let lists = Array.isArray(p.lists) ? p.lists
            : (typeof p.lists === "string" && p.lists.startsWith("["))
              ? JSON.parse(p.lists) : p.lists ? [p.lists] : [];
          // memberIdsを配列に変換・文字列統一・重複排除
          let rawIds = Array.isArray(p.memberIds) ? p.memberIds
            : (typeof p.memberIds === "string" && p.memberIds.startsWith("["))
              ? (() => { try { return JSON.parse(p.memberIds); } catch(e) { return []; } })()
              : p.memberIds ? [p.memberIds] : [];
          let memberIds = [...new Set(rawIds.map(x=>String(x)))];
          return {...p, lists, memberIds};
        });
        const members = (data.members||[]).map(m=>({...m, id:String(m.id)}));
        setMembers(members.length ? members : DEFAULT_MEMBERS);
        setProjects(projects.length ? projects : DEFAULT_PROJECTS);
        setReports((data.reports||[]).map(r => ({
          ...r,
          entries: Array.isArray(r.entries) ? r.entries
            : (typeof r.entries === "string" && r.entries.startsWith("["))
              ? JSON.parse(r.entries) : [],
        })));
      } catch(e) {
        setInitError("スプレッドシートへの接続に失敗しました。GASのURLを確認してください。");
        setMembers(DEFAULT_MEMBERS);
        setProjects(DEFAULT_PROJECTS);
      } finally { setLoading(false); }
    })();
  },[]);

  const saveMembers=useCallback(async m=>{
    setMembers(m);
    try { await apiPost({action:"saveMembers",data:m}); } catch(e) { console.warn("saveMembers:", e); }
  },[]);

  const saveProjects=useCallback(async p=>{
    setProjects(p);
    try { await apiPost({action:"saveProjects",data:p}); } catch(e) { console.warn("saveProjects:", e); }
  },[]);

  const addReport=useCallback(async r=>{
    setReports(rs=>[...rs,r]);
    try { await apiPost({action:"addReport",data:r}); } catch(e) { console.warn("addReport:", e); }
  },[]);

  const deleteReport=useCallback(async id=>{
    setReports(rs=>rs.filter(r=>r.id!==id));
    await apiPost({action:"deleteReport",id});
  },[]);

  const tabs=[
    {key:"report",    label:"📋 日次報告"},
    {key:"dashboard", label:"📊 ダッシュボード"},
    {key:"reports",   label:"🗂 報告一覧"},
    {key:"admin",     label:"⚙️ マスタ管理"},
  ];

  return(
    <div className="app">
      <nav className="nav">
        <span className="nav-logo">IS日次報告</span>
        {tabs.map(t=>(
          <button key={t.key} className={`nav-tab ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>{t.label}</button>
        ))}
      </nav>
      <main className="main">
        {initError&&<div className="error-msg" style={{marginBottom:16}}>⚠️ {initError}</div>}
        {tab==="dashboard"&&<DashboardView members={members} projects={projects} reports={reports} loading={loading}/>}
        {tab==="report"   &&<ReportFormView members={members} projects={projects} onSubmit={addReport} loading={loading}/>}
        {tab==="reports"  &&<ReportsView    members={members} projects={projects} reports={reports} onDelete={deleteReport} loading={loading}/>}
        {tab==="admin"    &&<AdminView       members={members} projects={projects} onSaveMembers={saveMembers} onSaveProjects={saveProjects} loading={loading}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
