<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IS日次報告</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f7fa;--surface:#fff;--surface2:#f0f3f8;--border:#dde3ed;
  --accent:#2563eb;--accent2:#0891b2;--green:#059669;--yellow:#d97706;--red:#dc2626;
  --text:#1e293b;--muted:#64748b;--radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:6px;min-height:56px;position:sticky;top:0;z-index:100;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nav-logo{font-size:15px;font-weight:700;color:var(--accent);margin-right:12px;white-space:nowrap;}
.nav-tab{background:none;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:var(--accent);color:#fff;}
.main{flex:1;padding:20px 16px;max-width:1200px;margin:0 auto;width:100%;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card+.card{margin-top:14px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:700px){.grid2,.grid4{grid-template-columns:1fr 1fr;}}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.stat-value{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--text);}
.progress-bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:5px;}
.progress-fill{height:100%;border-radius:999px;transition:width .5s;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:8px 10px;text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap;background:#fafbfc;}
td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8faff;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;}
.form-input,.form-select{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;transition:border .2s;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-input:disabled,.form-select:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.call-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:480px){.call-grid{grid-template-columns:repeat(4,1fr);}}
.call-field{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:10px;}
.call-field label{display:block;font-size:10px;font-weight:700;margin-bottom:4px;color:var(--muted);}
.call-field input{width:100%;background:transparent;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:20px;font-weight:700;outline:none;}
.btn{border:none;border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;padding:9px 16px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1d4ed8;}
.btn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red);font-size:12px;padding:5px 10px;}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);font-size:13px;padding:7px 12px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#047857;}
.btn-export{background:#fff;border:1.5px solid var(--green);color:var(--green);font-size:13px;padding:7px 12px;font-weight:700;}
.btn-export:hover{background:var(--green);color:#fff;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 10px;border-radius:6px;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.badge{display:inline-block;border-radius:99px;font-size:11px;font-weight:700;padding:2px 8px;}
.badge-blue{background:#eff6ff;color:var(--accent);}
.badge-cyan{background:#ecfeff;color:var(--accent2);}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.sec-title{font-size:16px;font-weight:700;color:var(--text);}
.success-msg{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:12px;color:var(--green);font-weight:700;text-align:center;margin-bottom:14px;}
.error-msg{background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;padding:10px;color:var(--red);margin-bottom:12px;font-size:13px;font-weight:600;}
.warn-msg{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#92400e;font-weight:600;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filter-row select{background:#fff;border:1.5px solid var(--border);color:var(--text);border-radius:7px;padding:7px 12px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px;}
.member-tag{background:var(--surface2);border:1.5px solid var(--border);border-radius:5px;font-size:12px;padding:3px 8px;color:var(--muted);cursor:pointer;display:inline-block;margin:2px;transition:all .2s;font-weight:500;}
.member-tag.selected{background:#eff6ff;border-color:var(--accent);color:var(--accent);}
.list-entry{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.list-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.list-entry-title{font-size:13px;font-weight:700;color:var(--accent2);}
.list-chip{background:#ecfeff;border:1px solid #a5f3fc;border-radius:6px;padding:3px 8px;font-size:12px;color:var(--accent2);display:inline-flex;align-items:center;gap:5px;margin:2px;font-weight:600;}
.list-chip-x{cursor:pointer;color:var(--red);font-weight:700;}
.expand-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 6px;font-weight:700;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbxIlzttIprsOsUfNAzR3hdlzps0KHtpztzEuAbQ2xqCqhTAmvjrjARS2SukhvI-wPV7/exec";
const ADMIN_PASSWORD = "is2024admin";

const DEFAULT_MEMBERS = [{id:"m1",name:"田中 花子"},{id:"m2",name:"佐藤 太郎"}];
const DEFAULT_PROJECTS = [{id:"p1",name:"サンプル案件",targetAppo:20,targetCalls:500,targetHours:100,memberIds:["m1","m2"],lists:["リストA"],slackWebhook:"",weeklyMention:""}];

const CALL_FIELDS = [
  {key:"calls",label:"架電数",color:"var(--text)"},
  {key:"appo",label:"アポ数",color:"var(--accent)"},
  {key:"materialSelf",label:"本人資料請求",color:"var(--accent2)"},
  {key:"noAnswer",label:"不通",color:"var(--muted)"},
  {key:"absent",label:"本人不在",color:"var(--muted)"},
  {key:"rejectedSelf",label:"本人拒否",color:"var(--red)"},
  {key:"rejectedReception",label:"受付拒否",color:"var(--red)"},
  {key:"materialReception",label:"受付資料請求",color:"var(--yellow)"},
];
const EMPTY_ENTRY = ()=>({listName:"",workHours:"",calls:"",appo:"",materialSelf:"",noAnswer:"",absent:"",rejectedSelf:"",rejectedReception:"",materialReception:""});

function calcStats(reports){
  const t={workHours:0,calls:0,appo:0,materialSelf:0,noAnswer:0,absent:0,rejectedSelf:0,rejectedReception:0,materialReception:0};
  reports.forEach(r=>{
    const entries=r.entries&&Array.isArray(r.entries)?r.entries:[r];
    entries.forEach(e=>{Object.keys(t).forEach(k=>{t[k]+=Number(e[k])||0;});});
  });
  const connected=t.appo+t.materialSelf+t.absent+t.rejectedSelf;
  const selfConnected=t.appo+t.rejectedSelf+t.materialSelf;
  const listCaDenom=t.appo+t.materialSelf+t.rejectedSelf;
  return{
    ...t,connected,
    appoRate:t.calls>0?((t.appo/t.calls)*100).toFixed(1):"0.0",
    connectRate:t.calls>0?((connected/t.calls)*100).toFixed(1):"0.0",
    caRate:connected>0?(((t.appo+t.materialSelf)/connected)*100).toFixed(1):"0.0",
    listCaRate:listCaDenom>0?((t.appo/listCaDenom)*100).toFixed(1):"0.0",
    selfConnectRate:t.calls>0?((selfConnected/t.calls)*100).toFixed(1):"0.0",
    callsPerHour:t.workHours>0?(t.calls/t.workHours).toFixed(1):"-",
  };
}

function exportToCSV(reports,members,projects){
  const getM=id=>members.find(m=>m.id===id)?.name||id;
  const getP=id=>projects.find(p=>p.id===id)?.name||id;
  const rows=[["日付","名前","案件名","リスト名","稼働時間","架電数","アポ数","本人資料請求","不通","本人不在","本人拒否","受付拒否","受付資料請求","アポ率(%)","通電率(%)","CA率(%)","所感"]];
  reports.sort((a,b)=>String(a.date||"").localeCompare(String(b.date||""))).forEach(r=>{
    const entries=Array.isArray(r.entries)?r.entries:[];
    entries.forEach((e,i)=>{
      const s=calcStats([{entries:[e]}]);
      rows.push([String(r.date||"").slice(0,10),getM(r.memberId),getP(r.projectId),e.listName||"",
        Number(e.workHours)||0,Number(e.calls)||0,Number(e.appo)||0,Number(e.materialSelf)||0,
        Number(e.noAnswer)||0,Number(e.absent)||0,Number(e.rejectedSelf)||0,
        Number(e.rejectedReception)||0,Number(e.materialReception)||0,
        s.appoRate,s.connectRate,s.caRate,i===0?(r.impression||""):"",
      ]);
    });
  });
  const bom="\uFEFF";
  const csv=bom+rows.map(r=>r.map(v=>{
    const sv=String(v===null||v===undefined?"":v);
    return '"'+sv.replace(/"/g,'""')+'"';
  }).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`IS報告_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}

async function apiGet(){
  const res=await fetch(GAS_URL);
  const data=await res.json();
  if(data.error)throw new Error(data.error);
  return data;
}
async function apiPost(body){
  await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)});
  return{success:true};
}

function parseProjects(raw){
  return(raw||[]).map(p=>{
    let lists=Array.isArray(p.lists)?p.lists:
      (typeof p.lists==="string"&&p.lists.startsWith("["))?JSON.parse(p.lists):p.lists?[p.lists]:[];
    let rawIds=Array.isArray(p.memberIds)?p.memberIds:
      (typeof p.memberIds==="string"&&p.memberIds.startsWith("["))?JSON.parse(p.memberIds):p.memberIds?[p.memberIds]:[];
    let memberIds=[...new Set(rawIds.map(x=>String(x)))];
    return{...p,lists,memberIds,
      targetCalls:Number(p.targetCalls)||0,
      targetHours:Number(p.targetHours)||0,
      slackWebhook:p.slackWebhook||"",
      weeklyMention:p.weeklyMention||"",
    };
  });
}
function parseReports(raw){
  return(raw||[]).map(r=>{
    let entries=r.entries;
    if(!Array.isArray(entries)){
      if(typeof entries==="string"&&entries.startsWith("[")){ try{entries=JSON.parse(entries);}catch(e){entries=[];} }
      else entries=[];
    }
    return{...r,entries};
  });
}

// ===== ADMIN LOGIN =====
function AdminLogin({onLogin}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const handle=()=>{
    if(pw===ADMIN_PASSWORD)onLogin();
    else{setErr("パスワードが違います");setPw("");}
  };
  return(
    <div style={{background:"#fff",border:"1.5px solid var(--border)",borderRadius:12,padding:28,width:"100%",maxWidth:360}}>
      <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>管理者ログイン</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>ダッシュボード・報告一覧・マスタ管理にアクセスするにはパスワードが必要です</div>
      {err&&<div className="error-msg">{err}</div>}
      <div style={{marginBottom:14}}>
        <label className="form-label">パスワード</label>
        <input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="パスワードを入力"/>
      </div>
      <button className="btn btn-primary" onClick={handle} style={{width:"100%"}}>ログイン</button>
    </div>
  );
}

// ===== DASHBOARD =====
function DashboardView({members,projects,reports,loading}){
  const [fp,setFp]=useState("all");
  const [fm,setFm]=useState("all");
  const [fmo,setFmo]=useState("all");
  const months=[...new Set(reports.map(r=>String(r.date||"").slice(0,7)))].sort().reverse();
  const filtered=reports.filter(r=>{
    if(fp!=="all"&&r.projectId!==fp)return false;
    if(fm!=="all"&&r.memberId!==fm)return false;
    if(fmo!=="all"&&!String(r.date||"").startsWith(fmo))return false;
    return true;
  });
  const overall=calcStats(filtered);
  const getP=id=>projects.find(p=>p.id===id)?.name||id;
  const C_GREEN="#059669",C_YELLOW="#d97706",C_ACCENT="#2563eb";

  const listMap={};
  filtered.forEach(r=>{
    (r.entries||[]).forEach(e=>{
      const k=r.projectId+"|||"+e.listName;
      if(!listMap[k])listMap[k]={projectId:r.projectId,listName:e.listName,rows:[]};
      listMap[k].rows.push(e);
    });
  });

  if(loading)return <div className="loading"><div className="spinner"/>読み込み中...</div>;
  return(
    <div>
      <div className="sec-header">
        <div className="sec-title">📊 ダッシュボード</div>
        <button className="btn btn-export" onClick={()=>exportToCSV(filtered,members,projects)}>⬇️ CSVエクスポート</button>
      </div>
      <div className="filter-row">
        <select value={fp} onChange={e=>setFp(e.target.value)}>
          <option value="all">全案件</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={fm} onChange={e=>setFm(e.target.value)}>
          <option value="all">全メンバー</option>
          {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <select value={fmo} onChange={e=>setFmo(e.target.value)}>
          <option value="all">全期間</option>
          {months.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">全体サマリー（{filtered.length}件）</div>
        <div className="grid4">
          {[{l:"架電数",v:overall.calls.toLocaleString(),c:"var(--text)"},{l:"アポ数",v:overall.appo,c:"var(--accent)"},
            {l:"アポ率",v:overall.appoRate+"%",c:"#059669"},{l:"通電率",v:overall.connectRate+"%",c:"#d97706"},
            {l:"CA率",v:overall.caRate+"%",c:"var(--accent2)"},{l:"本人接続率",v:overall.selfConnectRate+"%",c:"var(--accent2)"},
            {l:"本人資料請求",v:overall.materialSelf,c:"var(--text)"},{l:"受付資料請求",v:overall.materialReception,c:"var(--text)"},
          ].map(s=>(
            <div className="stat" key={s.l}>
              <div className="stat-label">{s.l}</div>
              <div className="stat-value" style={{color:s.c,fontSize:18}}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">案件別進捗</div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>案件名</th><th>目標</th><th>アポ</th><th>進捗率</th><th>架電</th><th>残コール</th><th>残稼働h</th><th>アポ率</th><th>通電率</th><th>本人接続率</th><th>CA率</th></tr></thead>
            <tbody>
              {projects.filter(p=>fp==="all"||p.id===fp).map(p=>{
                const s=calcStats(filtered.filter(r=>r.projectId===p.id));
                const pct=p.targetAppo>0?Math.min(100,s.appo/p.targetAppo*100).toFixed(0):0;
                const col=pct>=80?C_GREEN:pct>=50?C_YELLOW:C_ACCENT;
                const remCalls=p.targetCalls>0?Math.max(0,p.targetCalls-s.calls):null;
                const remHours=p.targetHours>0?Math.max(0,p.targetHours-s.workHours).toFixed(1):null;
                return(
                  <tr key={p.id}>
                    <td style={{fontWeight:700}}>{p.name}</td>
                    <td>{p.targetAppo}</td>
                    <td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                    <td><span style={{fontSize:12,fontWeight:700,color:col}}>{pct}%</span>
                      <div className="progress-bar"><div className="progress-fill" style={{width:pct+"%",background:col}}/></div></td>
                    <td>{s.calls}</td>
                    <td style={{color:remCalls===0?"var(--red)":"var(--text)"}}>{remCalls!==null?remCalls+"件":"-"}</td>
                    <td style={{color:remHours===0?"var(--red)":"var(--text)"}}>{remHours!==null?remHours+"h":"-"}</td>
                    <td>{s.appoRate}%</td><td>{s.connectRate}%</td>
                    <td style={{color:"var(--accent2)",fontWeight:600}}>{s.selfConnectRate}%</td>
                    <td>{s.caRate}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {Object.keys(listMap).length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div className="card-title">リスト別詳細</div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>案件</th><th>リスト名</th><th>架電</th><th>アポ</th><th>本人資料</th><th>不通</th><th>不在</th><th>本人拒否</th><th>受付拒否</th><th>受付資料</th><th>アポ率</th><th>通電率</th><th>本人接続率</th><th>CA率</th></tr></thead>
              <tbody>
                {Object.values(listMap).map((ls,i)=>{
                  const s=calcStats([{entries:ls.rows}]);
                  return(
                    <tr key={i}>
                      <td><span className="badge badge-blue">{getP(ls.projectId)}</span></td>
                      <td style={{color:"var(--accent2)",fontWeight:700}}>{ls.listName}</td>
                      <td>{s.calls}</td><td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                      <td>{s.materialSelf}</td>
                      <td style={{color:"var(--muted)"}}>{s.noAnswer}</td>
                      <td style={{color:"var(--muted)"}}>{s.absent}</td>
                      <td style={{color:"var(--red)"}}>{s.rejectedSelf}</td>
                      <td style={{color:"var(--red)"}}>{s.rejectedReception}</td>
                      <td>{s.materialReception}</td>
                      <td>{s.appoRate}%</td><td>{s.connectRate}%</td>
                      <td style={{color:"var(--accent2)",fontWeight:600}}>{s.selfConnectRate}%</td>
                      <td style={{color:"var(--green)",fontWeight:700}}>{s.listCaRate}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
      <div className="card">
        <div className="card-title">メンバー別実績（案件ごと）</div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>名前</th><th>案件</th><th>報告数</th><th>稼働h</th><th>架電</th><th>1h当りコール</th><th>アポ</th><th>アポ率</th><th>通電率</th><th>CA率</th></tr></thead>
            <tbody>
              {(()=>{
                const rows=[];
                members.forEach(m=>{
                  const mr=filtered.filter(r=>r.memberId===m.id);
                  if(!mr.length)return;
                  const byP={};
                  mr.forEach(r=>{if(!byP[r.projectId])byP[r.projectId]=[];byP[r.projectId].push(r);});
                  const pIds=Object.keys(byP);
                  pIds.forEach((pId,pi)=>{
                    const pr=byP[pId];
                    const s=calcStats(pr);
                    rows.push(
                      <tr key={m.id+"-"+pId}>
                        {pi===0&&<td style={{fontWeight:700,verticalAlign:"top"}} rowSpan={pIds.length}>{m.name}</td>}
                        <td><span className="badge badge-blue">{getP(pId)}</span></td>
                        <td>{pr.length}日</td>
                        <td>{s.workHours>0?s.workHours+"h":"-"}</td>
                        <td>{s.calls}</td>
                        <td style={{color:"var(--accent2)",fontWeight:700}}>{s.callsPerHour}</td>
                        <td style={{color:"var(--accent)",fontWeight:700}}>{s.appo}</td>
                        <td>{s.appoRate}%</td><td>{s.connectRate}%</td><td>{s.caRate}%</td>
                      </tr>
                    );
                  });
                });
                if(!rows.length)return <tr><td colSpan={10} className="empty">データなし</td></tr>;
                return rows;
              })()}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ===== REPORT FORM =====
function ReportFormView({members,projects,onSubmit,loading}){
  const today=new Date().toISOString().slice(0,10);
  const [date,setDate]=useState(today);
  const [memberId,setMemberId]=useState("");
  const [projectId,setProjectId]=useState("");
  const [entries,setEntries]=useState([EMPTY_ENTRY()]);
  const [impression,setImpression]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const [error,setError]=useState("");
  const [sending,setSending]=useState(false);

  const memberProjects=memberId?projects.filter(p=>(p.memberIds||[]).map(x=>String(x)).includes(String(memberId))):[];
  const currentProject=projects.find(p=>p.id===projectId);
  const listOptions=currentProject?.lists||[];

  const setEntry=(i,k,v)=>setEntries(es=>es.map((e,j)=>j===i?{...e,[k]:v}:e));
  const addEntry=()=>setEntries(es=>[...es,EMPTY_ENTRY()]);
  const removeEntry=i=>setEntries(es=>es.filter((_,j)=>j!==i));
  const reset=()=>{setMemberId("");setProjectId("");setDate(today);setEntries([EMPTY_ENTRY()]);setImpression("");setSubmitted(false);setError("");};

  const handleSubmit=async()=>{
    if(!memberId){setError("名前を選択してください");return;}
    if(!projectId){setError("案件を選択してください");return;}
    if(entries.some(e=>!e.listName)){setError("リスト名を入力してください");return;}
    if(entries.some(e=>!e.calls)){setError("架電数を入力してください");return;}
    setError("");setSending(true);
    try{
      await onSubmit({id:Date.now().toString(),createdAt:new Date().toISOString(),date,memberId,projectId,entries,impression});
      setSubmitted(true);
    }catch(e){setError("送信に失敗しました");}
    finally{setSending(false);}
  };

  if(loading)return <div className="loading"><div className="spinner"/>読み込み中...</div>;
  if(submitted)return(
    <div style={{maxWidth:600,margin:"0 auto"}}>
      <div className="success-msg">送信しました！お疲れ様でした。</div>
      <div style={{textAlign:"center"}}><button className="btn btn-primary" onClick={reset}>続けて報告する</button></div>
    </div>
  );
  return(
    <div style={{maxWidth:660,margin:"0 auto"}}>
      <div className="sec-title" style={{marginBottom:14}}>📋 日次報告入力</div>
      {error&&<div className="error-msg">⚠️ {error}</div>}
      <div className="card">
        <div className="grid2" style={{gap:12,marginBottom:12}}>
          <div><label className="form-label">日付</label>
            <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label className="form-label">名前</label>
            <select className="form-select" value={memberId} onChange={e=>{setMemberId(e.target.value);setProjectId("");}}>
              <option value="">選択してください</option>
              {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select></div>
        </div>
        <div><label className="form-label">案件{!memberId&&<span style={{color:"var(--muted)",fontWeight:400,fontSize:11}}> ← 先に名前を選んでください</span>}</label>
          <select className="form-select" value={projectId} onChange={e=>setProjectId(e.target.value)} disabled={!memberId}>
            <option value="">選択してください</option>
            {memberProjects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select></div>
      </div>
      {entries.map((entry,i)=>(
        <div className="list-entry" key={i} style={{marginTop:10}}>
          <div className="list-entry-header">
            <span className="list-entry-title">📁 リスト {i+1}</span>
            {entries.length>1&&<button className="btn btn-danger" onClick={()=>removeEntry(i)}>削除</button>}
          </div>
          <div style={{marginBottom:10}}>
            <label className="form-label">リスト名</label>
            {listOptions.length>0
              ?<select className="form-select" value={entry.listName} onChange={e=>setEntry(i,"listName",e.target.value)}>
                <option value="">選択してください</option>
                {listOptions.map(l=><option key={l} value={l}>{l}</option>)}
              </select>
              :<input className="form-input" placeholder="案件を先に選んでください" value={entry.listName}
                onChange={e=>setEntry(i,"listName",e.target.value)} disabled={!projectId}/>
            }
          </div>
          <div style={{marginBottom:10}}>
            <label className="form-label">稼働時間（例：3.5）</label>
            <input className="form-input" type="number" min="0" step="0.5" placeholder="例：3.5"
              value={entry.workHours} onChange={e=>setEntry(i,"workHours",e.target.value)} style={{maxWidth:140}}/>
          </div>
          <div className="call-grid">
            {CALL_FIELDS.map(f=>(
              <div className="call-field" key={f.key}>
                <label style={{color:["var(--text)","var(--muted)"].includes(f.color)?"var(--muted)":f.color}}>{f.label}</label>
                <input type="number" min="0" placeholder="0" value={entry[f.key]}
                  onChange={e=>setEntry(i,f.key,e.target.value)}
                  style={{color:["var(--text)","var(--muted)"].includes(f.color)?"var(--text)":f.color}}/>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{marginTop:12,background:"#fff",border:"1.5px solid var(--border)",borderRadius:10,padding:14}}>
        <label className="form-label">📝 所感・メモ（任意）</label>
        <textarea className="form-input" placeholder="今日のコールで気づいたこと、トークのポイントなど"
          value={impression} onChange={e=>setImpression(e.target.value)} style={{minHeight:90,resize:"vertical",lineHeight:1.6}}/>
      </div>
      <div style={{display:"flex",gap:10,marginTop:12,justifyContent:"space-between"}}>
        <button className="btn btn-ghost" onClick={addEntry}>＋ リストを追加</button>
        <button className="btn btn-primary" onClick={handleSubmit} disabled={sending} style={{minWidth:120}}>
          {sending?<><div className="spinner" style={{width:14,height:14,borderWidth:2}}/>送信中...</>:"送信する →"}
        </button>
      </div>
    </div>
  );
}

// ===== REPORTS VIEW =====
function ReportsView({members,projects,reports,onDelete,onUpdate,loading}){
  const [fp,setFp]=useState("all");
  const [fm,setFm]=useState("all");
  const [expandedId,setExpandedId]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editData,setEditData]=useState(null);
  const [saving,setSaving]=useState(false);

  const getM=id=>members.find(m=>m.id===id)?.name||id;
  const getP=id=>projects.find(p=>p.id===id)?.name||id;

  const filtered=reports.filter(r=>{
    if(fp!=="all"&&r.projectId!==fp)return false;
    if(fm!=="all"&&r.memberId!==fm)return false;
    return true;
  }).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));

  const startEdit=r=>{setEditingId(r.id);setEditData(JSON.parse(JSON.stringify(r)));setExpandedId(r.id);};
  const cancelEdit=()=>{setEditingId(null);setEditData(null);};
  const saveEdit=async()=>{
    setSaving(true);
    try{await onUpdate(editData);setEditingId(null);setEditData(null);}
    catch(e){alert("保存に失敗しました");}
    finally{setSaving(false);}
  };
  const setEntryField=(i,k,v)=>setEditData(d=>({...d,entries:d.entries.map((e,j)=>j===i?{...e,[k]:v}:e)}));

  if(loading)return <div className="loading"><div className="spinner"/>読み込み中...</div>;
  return(
    <div>
      <div className="sec-header">
        <div className="sec-title">🗂 報告一覧</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className="badge badge-blue">{filtered.length}件</span>
          <button className="btn btn-export" onClick={()=>exportToCSV(filtered,members,projects)}>⬇️ CSVエクスポート</button>
        </div>
      </div>
      <div className="filter-row">
        <select value={fp} onChange={e=>setFp(e.target.value)}>
          <option value="all">全案件</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={fm} onChange={e=>setFm(e.target.value)}>
          <option value="all">全メンバー</option>
          {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
      </div>
      {filtered.length===0&&<div className="card"><div className="empty">報告がありません</div></div>}
      {filtered.map(r=>{
        const s=calcStats([r]);
        const isExp=expandedId===r.id;
        const isEdit=editingId===r.id;
        const d=String(r.date||"").slice(0,10);
        return(
          <div key={r.id} className="card" style={{marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <button className="expand-btn" onClick={()=>setExpandedId(isExp?null:r.id)}>{isExp?"▲":"▼"}</button>
              <span style={{fontWeight:700}}>{d}</span>
              <span style={{fontWeight:700}}>{getM(r.memberId)}</span>
              <span className="badge badge-blue">{getP(r.projectId)}</span>
              <span className="badge badge-cyan">{(r.entries||[]).length}リスト</span>
              <span style={{fontSize:12,color:"var(--muted)"}}>架電:{s.calls} アポ:{s.appo} アポ率:{s.appoRate}%</span>
              <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                {!isEdit&&<button className="btn btn-sm" onClick={()=>startEdit(r)}>✏️ 修正</button>}
                {!isEdit&&<button className="btn btn-danger" onClick={()=>onDelete(r.id)}>削除</button>}
              </div>
            </div>
            {isExp&&!isEdit&&(
              <div style={{marginTop:12}}>
                {(r.entries||[]).map((e,i)=>(
                  <div key={i} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:12,marginBottom:8}}>
                    <div style={{fontWeight:700,color:"var(--accent2)",marginBottom:8,fontSize:13}}>📁 {e.listName}{e.workHours?" (稼働"+e.workHours+"h)":""}</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                      {[{l:"架電数",k:"calls",c:"var(--text)"},{l:"アポ数",k:"appo",c:"var(--accent)"},
                        {l:"本人資料請求",k:"materialSelf",c:"var(--accent2)"},{l:"不通",k:"noAnswer",c:"var(--muted)"},
                        {l:"本人不在",k:"absent",c:"var(--muted)"},{l:"本人拒否",k:"rejectedSelf",c:"var(--red)"},
                        {l:"受付拒否",k:"rejectedReception",c:"var(--red)"},{l:"受付資料請求",k:"materialReception",c:"var(--yellow)"},
                      ].map(f=>(
                        <div key={f.k} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:6,padding:"7px 9px"}}>
                          <div style={{fontSize:10,color:"var(--muted)",fontWeight:700,marginBottom:2}}>{f.l}</div>
                          <div style={{fontFamily:"'Space Mono',monospace",fontSize:17,fontWeight:700,color:["var(--text)","var(--muted)"].includes(f.c)?"var(--text)":f.c}}>{Number(e[f.k])||0}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                {r.impression&&r.impression.trim()&&(
                  <div style={{marginTop:8,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:10,fontSize:13}}>
                    <span style={{fontWeight:700,color:"var(--yellow)"}}>📝 所感：</span>{r.impression}
                  </div>
                )}
              </div>
            )}
            {isEdit&&editData&&(
              <div style={{marginTop:12}}>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                  <div><label className="form-label">日付</label>
                    <input className="form-input" type="date" style={{width:150}}
                      value={String(editData.date||"").slice(0,10)}
                      onChange={e=>setEditData(d=>({...d,date:e.target.value}))}/></div>
                  <div><label className="form-label">名前</label>
                    <select className="form-select" style={{width:130}} value={editData.memberId}
                      onChange={e=>setEditData(d=>({...d,memberId:e.target.value}))}>
                      {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                    </select></div>
                  <div><label className="form-label">案件</label>
                    <select className="form-select" style={{width:150}} value={editData.projectId}
                      onChange={e=>setEditData(d=>({...d,projectId:e.target.value}))}>
                      {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                    </select></div>
                </div>
                {(editData.entries||[]).map((e,i)=>(
                  <div key={i} style={{background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:10,padding:12,marginBottom:10}}>
                    <div style={{marginBottom:8}}>
                      <label className="form-label">リスト名</label>
                      <input className="form-input" value={e.listName||""} onChange={ev=>setEntryField(i,"listName",ev.target.value)}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                      {[{l:"稼働時間",k:"workHours"},{l:"架電数",k:"calls"},{l:"アポ数",k:"appo"},
                        {l:"本人資料請求",k:"materialSelf"},{l:"不通",k:"noAnswer"},{l:"本人不在",k:"absent"},
                        {l:"本人拒否",k:"rejectedSelf"},{l:"受付拒否",k:"rejectedReception"},{l:"受付資料請求",k:"materialReception"},
                      ].map(f=>(
                        <div key={f.k} style={{display:"flex",alignItems:"center",gap:8}}>
                          <label style={{fontSize:12,color:"var(--muted)",fontWeight:600,minWidth:100}}>{f.l}</label>
                          <input className="form-input" type="number" min="0" style={{width:80}}
                            value={e[f.k]||""} onChange={ev=>setEntryField(i,f.k,ev.target.value)}/>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div style={{marginBottom:10}}>
                  <label className="form-label">所感</label>
                  <textarea className="form-input" style={{minHeight:70,resize:"vertical"}}
                    value={editData.impression||""}
                    onChange={e=>setEditData(d=>({...d,impression:e.target.value}))}/>
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button className="btn btn-ghost" onClick={cancelEdit}>キャンセル</button>
                  <button className="btn btn-green" onClick={saveEdit} disabled={saving}>{saving?"保存中...":"💾 保存する"}</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ===== ADMIN VIEW =====
function AdminView({members,projects,onSaveMembers,onSaveProjects,loading}){
  const [lm,setLm]=useState(members);
  const [lp,setLp]=useState(projects);
  const [newM,setNewM]=useState("");
  const [newP,setNewP]=useState({name:"",targetAppo:"",targetCalls:"",targetHours:"",memberIds:[],lists:[],slackWebhook:"",weeklyMention:""});
  const [listInputs,setListInputs]=useState({});
  const [savedMsg,setSavedMsg]=useState("");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>setLm(members.map(m=>({...m,id:String(m.id)}))),[members]);
  useEffect(()=>setLp(projects),[projects]);

  const save=async()=>{
    setSaving(true);setErr("");
    try{
      await onSaveMembers(lm);await onSaveProjects(lp);
      await new Promise(r=>setTimeout(r,1000));
      setSavedMsg("✅ 保存しました！");setTimeout(()=>setSavedMsg(""),3000);
    }catch(e){setErr("保存に失敗しました");}
    finally{setSaving(false);}
  };

  const addM=()=>{
    if(!newM.trim())return;
    const nextId="m"+(Math.max(0,...lm.map(m=>parseInt(m.id.replace(/\D/g,""))||0))+1);
    setLm(ms=>[...ms,{id:nextId,name:newM.trim()}]);setNewM("");
  };
  const addP=()=>{
    if(!newP.name.trim())return;
    const nextId="p"+(Math.max(0,...lp.map(p=>parseInt(p.id.replace(/\D/g,""))||0))+1);
    setLp(ps=>[...ps,{...newP,id:nextId,targetAppo:Number(newP.targetAppo)||0,targetCalls:Number(newP.targetCalls)||0,targetHours:Number(newP.targetHours)||0}]);
    setNewP({name:"",targetAppo:"",targetCalls:"",targetHours:"",memberIds:[],lists:[],slackWebhook:"",weeklyMention:""});
  };
  const toggleM=(mId,pidx)=>setLp(ps=>ps.map((p,i)=>{
    if(i!==pidx)return p;
    const current=[...new Set((p.memberIds||[]).map(x=>String(x)))];
    const sid=String(mId);
    const ids=current.includes(sid)?current.filter(x=>x!==sid):[...current,sid];
    return{...p,memberIds:ids};
  }));
  const addList=(pidx)=>{
    const v=(listInputs[pidx]||"").trim();if(!v)return;
    setLp(ps=>ps.map((p,i)=>i===pidx?{...p,lists:[...(p.lists||[]),v]}:p));
    setListInputs(s=>({...s,[pidx]:""}));
  };
  const removeList=(pidx,lidx)=>setLp(ps=>ps.map((p,i)=>i===pidx?{...p,lists:p.lists.filter((_,j)=>j!==lidx)}:p));

  if(loading)return <div className="loading"><div className="spinner"/>読み込み中...</div>;
  return(
    <div>
      <div className="sec-header">
        <div className="sec-title">⚙️ マスタ管理</div>
        <button className="btn btn-green" onClick={save} disabled={saving}>
          {saving?<><div className="spinner" style={{width:14,height:14,borderWidth:2,borderTopColor:"#fff"}}/>保存中...</>:"💾 保存する"}
        </button>
      </div>
      {savedMsg&&<div className="success-msg">{savedMsg}</div>}
      {err&&<div className="error-msg">{err}</div>}
      <div className="warn-msg">⚠️ 変更後は必ず「保存する」を押してください</div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">メンバー管理</div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input className="form-input" style={{flex:1}} placeholder="新規メンバー名" value={newM}
            onChange={e=>setNewM(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addM()}/>
          <button className="btn btn-primary" onClick={addM}>追加</button>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>名前</th><th></th></tr></thead>
            <tbody>
              {lm.map((m,i)=>(
                <tr key={m.id}>
                  <td><input className="form-input" value={m.name} style={{maxWidth:260}}
                    onChange={e=>setLm(ms=>ms.map((x,j)=>j===i?{...x,name:e.target.value}:x))}/></td>
                  <td><button className="btn btn-danger" onClick={()=>setLm(ms=>ms.filter((_,j)=>j!==i))}>削除</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="card-title">案件管理</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <input className="form-input" placeholder="案件名" style={{flex:1,minWidth:120}} value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))}/>
          <input className="form-input" placeholder="目標アポ" type="number" style={{width:90}} value={newP.targetAppo} onChange={e=>setNewP(p=>({...p,targetAppo:e.target.value}))}/>
          <input className="form-input" placeholder="目標コール" type="number" style={{width:100}} value={newP.targetCalls} onChange={e=>setNewP(p=>({...p,targetCalls:e.target.value}))}/>
          <input className="form-input" placeholder="目標稼働h" type="number" style={{width:100}} value={newP.targetHours} onChange={e=>setNewP(p=>({...p,targetHours:e.target.value}))}/>
          <button className="btn btn-primary" onClick={addP}>追加</button>
        </div>
        <div style={{marginBottom:14}}>
          <input className="form-input" placeholder="Slack Webhook URL（所感通知用）" value={newP.slackWebhook} onChange={e=>setNewP(p=>({...p,slackWebhook:e.target.value}))}/>
        </div>
        {lp.map((p,pidx)=>(
          <div key={p.id} style={{background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:10,padding:14,marginBottom:12}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
              <input className="form-input" style={{flex:1,minWidth:120}} value={p.name}
                onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,name:e.target.value}:x))}/>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",fontWeight:700}}>目標アポ</span>
                <input className="form-input" type="number" style={{width:65}} value={p.targetAppo}
                  onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,targetAppo:Number(e.target.value)}:x))}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",fontWeight:700}}>目標コール</span>
                <input className="form-input" type="number" style={{width:75}} value={p.targetCalls||""}
                  onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,targetCalls:Number(e.target.value)}:x))}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",fontWeight:700}}>目標稼働h</span>
                <input className="form-input" type="number" style={{width:70}} value={p.targetHours||""}
                  onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,targetHours:Number(e.target.value)}:x))}/>
              </div>
              <button className="btn btn-danger" onClick={()=>setLp(ps=>ps.filter((_,j)=>j!==pidx))}>削除</button>
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontWeight:700}}>担当メンバー</div>
            <div style={{marginBottom:12,display:"flex",flexWrap:"wrap",gap:4}}>
              {lm.map(m=>(
                <span key={m.id} className={`member-tag ${(p.memberIds||[]).map(x=>String(x)).includes(String(m.id))?"selected":""}`}
                  onClick={()=>toggleM(m.id,pidx)}>{m.name}</span>
              ))}
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontWeight:700}}>リスト管理</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
              {(p.lists||[]).map((l,lidx)=>(
                <span key={lidx} className="list-chip">{l}
                  <span className="list-chip-x" onClick={()=>removeList(pidx,lidx)}>×</span>
                </span>
              ))}
              {!(p.lists||[]).length&&<span style={{fontSize:12,color:"var(--muted)"}}>リストなし</span>}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input className="form-input" style={{flex:1}} placeholder="新規リスト名"
                value={listInputs[pidx]||""}
                onChange={e=>setListInputs(s=>({...s,[pidx]:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&addList(pidx)}/>
              <button className="btn btn-ghost" onClick={()=>addList(pidx)}>＋追加</button>
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontWeight:700}}>Slack Webhook URL（所感通知用）</div>
            <input className="form-input" style={{marginBottom:8}} placeholder="https://hooks.slack.com/services/..."
              value={p.slackWebhook||""}
              onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,slackWebhook:e.target.value}:x))}/>
            {p.slackWebhook&&<div style={{fontSize:11,color:"var(--green)",marginBottom:8}}>✅ Slack連携設定済み</div>}
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontWeight:700}}>週次レポート メンション（SlackユーザーID）</div>
            <input className="form-input" placeholder="U012AB3CD"
              value={p.weeklyMention||""}
              onChange={e=>setLp(ps=>ps.map((x,j)=>j===pidx?{...x,weeklyMention:e.target.value}:x))}/>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>※ プロフィール→「メンバーIDをコピー」で取得できます</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== ROOT =====
function App(){
  const [tab,setTab]=useState("report");
  const [isAdmin,setIsAdmin]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [members,setMembers]=useState([]);
  const [projects,setProjects]=useState([]);
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const [initError,setInitError]=useState("");

  useEffect(()=>{
    (async()=>{
      try{
        const data=await apiGet();
        setMembers(data.members?.length?data.members.map(m=>({...m,id:String(m.id)})):DEFAULT_MEMBERS);
        setProjects(data.projects?.length?parseProjects(data.projects):DEFAULT_PROJECTS);
        setReports(parseReports(data.reports));
      }catch(e){
        setInitError("スプレッドシートへの接続に失敗しました");
        setMembers(DEFAULT_MEMBERS);setProjects(DEFAULT_PROJECTS);
      }finally{setLoading(false);}
    })();
  },[]);

  const saveMembers=useCallback(async m=>{setMembers(m);try{await apiPost({action:"saveMembers",data:m});}catch(e){console.warn(e);}},[]);
  const saveProjects=useCallback(async p=>{setProjects(p);try{await apiPost({action:"saveProjects",data:p});}catch(e){console.warn(e);}},[]);
  const addReport=useCallback(async r=>{
    setReports(rs=>[...rs,r]);
    try{await apiPost({action:"addReport",data:r});}catch(e){console.warn(e);}
  },[]);
  const deleteReport=useCallback(async id=>{
    setReports(rs=>rs.filter(r=>r.id!==id));
    try{await apiPost({action:"deleteReport",id});}catch(e){console.warn(e);}
  },[]);
  const updateReport=useCallback(async updated=>{
    setReports(rs=>rs.map(r=>r.id===updated.id?updated:r));
    try{await apiPost({action:"updateReport",data:updated});}catch(e){console.warn(e);}
  },[]);

  const adminTabs=[
    {key:"report",label:"📋 日次報告"},
    {key:"dashboard",label:"📊 ダッシュボード"},
    {key:"reports",label:"🗂 報告一覧"},
    {key:"admin",label:"⚙️ マスタ管理"},
  ];
  const tabs=isAdmin?adminTabs:[{key:"report",label:"📋 日次報告"}];

  return(
    <div className="app">
      {showLogin&&(
        <div className="overlay" onClick={()=>setShowLogin(false)}>
          <div onClick={e=>e.stopPropagation()}>
            <AdminLogin onLogin={()=>{setIsAdmin(true);setShowLogin(false);setTab("dashboard");}}/>
          </div>
        </div>
      )}
      <nav className="nav">
        <span className="nav-logo">IS日次報告</span>
        {tabs.map(t=>(
          <button key={t.key} className={`nav-tab ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>{t.label}</button>
        ))}
        <div style={{marginLeft:"auto"}}>
          {isAdmin
            ?<button className="nav-tab" onClick={()=>{setIsAdmin(false);setTab("report");}}>ログアウト</button>
            :<button className="nav-tab" onClick={()=>setShowLogin(true)}>管理者</button>
          }
        </div>
      </nav>
      <main className="main">
        {initError&&<div className="error-msg" style={{marginBottom:14}}>⚠️ {initError}</div>}
        {tab==="dashboard"&&isAdmin&&<DashboardView members={members} projects={projects} reports={reports} loading={loading}/>}
        {tab==="report"&&<ReportFormView members={members} projects={projects} onSubmit={addReport} loading={loading}/>}
        {tab==="reports"&&isAdmin&&<ReportsView members={members} projects={projects} reports={reports} onDelete={deleteReport} onUpdate={updateReport} loading={loading}/>}
        {tab==="admin"&&isAdmin&&<AdminView members={members} projects={projects} onSaveMembers={saveMembers} onSaveProjects={saveProjects} loading={loading}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
